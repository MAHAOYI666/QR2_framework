[build-system]
requires = ["setuptools>=68", "wheel", "Cython>=3.0"]
build-backend = "setuptools.build_meta"

[project]
name = "comb2"
version = "0.1.0"
description = "comb2 runtime package"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "numpy",
  "torch",
]

[tool.setuptools]
include-package-data = true
py-modules = []

[tool.setuptools.packages.find]
where = ["."]
include = ["comb2"]
