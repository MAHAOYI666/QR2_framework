[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "comb2-pcmaster"
version = "0.1.0"
description = "comb2 pcmaster backtest package"
requires-python = ">=3.10"
dependencies = [
  "numpy",
  "pandas",
  "matplotlib",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["comb2_pcmaster"]
